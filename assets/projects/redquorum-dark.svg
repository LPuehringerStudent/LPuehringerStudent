<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 130" width="480" height="130">
  <style>
    .bg { fill:#2E3440; }
    text { font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; text-anchor:middle; }
    .step { fill:#2E3440; stroke:#81A1C1; stroke-width:3; }
    .num { font-size:18px; font-weight:700; fill:#81A1C1; dominant-baseline:central; }
    .label { font-size:13px; font-weight:600; fill:#81A1C1; }
    .arrow { stroke:#81A1C1; stroke-width:2; fill:none; }
    .g1 .step { animation: s1s 10s infinite; }
    .g1 .num { animation: s1n 10s infinite; }
    .g1 .label { animation: s1l 10s infinite; }
    @keyframes s1s { 0%,0.00%,26.67%,33.33%,100%{fill:#2E3440;stroke:#81A1C1} 0.00%,26.67%{fill:#88C0D0;stroke:#88C0D0} }
    @keyframes s1n { 0%,0.00%,26.67%,33.33%,100%{fill:#81A1C1} 0.00%,26.67%{fill:#2E3440} }
    @keyframes s1l { 0%,0.00%,26.67%,33.33%,100%{fill:#81A1C1} 0.00%,26.67%{fill:#D8DEE9} }
    .g2 .step { animation: s2s 10s infinite; }
    .g2 .num { animation: s2n 10s infinite; }
    .g2 .label { animation: s2l 10s infinite; }
    @keyframes s2s { 0%,33.33%,60.00%,66.67%,100%{fill:#2E3440;stroke:#81A1C1} 33.33%,60.00%{fill:#88C0D0;stroke:#88C0D0} }
    @keyframes s2n { 0%,33.33%,60.00%,66.67%,100%{fill:#81A1C1} 33.33%,60.00%{fill:#2E3440} }
    @keyframes s2l { 0%,33.33%,60.00%,66.67%,100%{fill:#81A1C1} 33.33%,60.00%{fill:#D8DEE9} }
    .g3 .step { animation: s3s 10s infinite; }
    .g3 .num { animation: s3n 10s infinite; }
    .g3 .label { animation: s3l 10s infinite; }
    @keyframes s3s { 0%,66.67%,93.33%,100.00%,100%{fill:#2E3440;stroke:#81A1C1} 66.67%,93.33%{fill:#88C0D0;stroke:#88C0D0} }
    @keyframes s3n { 0%,66.67%,93.33%,100.00%,100%{fill:#81A1C1} 66.67%,93.33%{fill:#2E3440} }
    @keyframes s3l { 0%,66.67%,93.33%,100.00%,100%{fill:#81A1C1} 66.67%,93.33%{fill:#D8DEE9} }
  </style>
  <rect width="100%" height="100%" class="bg"/>
  <g class="g1" transform="translate(95,55)">
    <circle class="step" r="26"/>
    <text class="num" y="1">1</text>
    <text class="label" y="50">Scan</text>
</g>
  <g class="g2" transform="translate(255,55)">
    <circle class="step" r="26"/>
    <text class="num" y="1">2</text>
    <text class="label" y="50">Analyze</text>
</g>
  <g class="g3" transform="translate(415,55)">
    <circle class="step" r="26"/>
    <text class="num" y="1">3</text>
    <text class="label" y="50">Report</text>
</g>
  <line class="arrow" x1="121" y1="55" x2="229" y2="55"/>
  <line class="arrow" x1="281" y1="55" x2="389" y2="55"/>
</svg>
