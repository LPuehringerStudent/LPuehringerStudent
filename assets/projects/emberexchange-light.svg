<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 130" width="640" height="130">
  <style>
    .bg { fill:#ECEFF4; }
    text { font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; text-anchor:middle; }
    .step { fill:#ECEFF4; stroke:#4C566A; stroke-width:3; }
    .num { font-size:18px; font-weight:700; fill:#4C566A; dominant-baseline:central; }
    .label { font-size:13px; font-weight:600; fill:#4C566A; }
    .arrow { stroke:#4C566A; stroke-width:2; fill:none; }
    .g1 .step { animation: s1s 10s infinite; }
    .g1 .num { animation: s1n 10s infinite; }
    .g1 .label { animation: s1l 10s infinite; }
    @keyframes s1s { 0%,0.00%,20.00%,25.00%,100%{fill:#ECEFF4;stroke:#4C566A} 0.00%,20.00%{fill:#88C0D0;stroke:#88C0D0} }
    @keyframes s1n { 0%,0.00%,20.00%,25.00%,100%{fill:#4C566A} 0.00%,20.00%{fill:#ECEFF4} }
    @keyframes s1l { 0%,0.00%,20.00%,25.00%,100%{fill:#4C566A} 0.00%,20.00%{fill:#2E3440} }
    .g2 .step { animation: s2s 10s infinite; }
    .g2 .num { animation: s2n 10s infinite; }
    .g2 .label { animation: s2l 10s infinite; }
    @keyframes s2s { 0%,25.00%,45.00%,50.00%,100%{fill:#ECEFF4;stroke:#4C566A} 25.00%,45.00%{fill:#88C0D0;stroke:#88C0D0} }
    @keyframes s2n { 0%,25.00%,45.00%,50.00%,100%{fill:#4C566A} 25.00%,45.00%{fill:#ECEFF4} }
    @keyframes s2l { 0%,25.00%,45.00%,50.00%,100%{fill:#4C566A} 25.00%,45.00%{fill:#2E3440} }
    .g3 .step { animation: s3s 10s infinite; }
    .g3 .num { animation: s3n 10s infinite; }
    .g3 .label { animation: s3l 10s infinite; }
    @keyframes s3s { 0%,50.00%,70.00%,75.00%,100%{fill:#ECEFF4;stroke:#4C566A} 50.00%,70.00%{fill:#88C0D0;stroke:#88C0D0} }
    @keyframes s3n { 0%,50.00%,70.00%,75.00%,100%{fill:#4C566A} 50.00%,70.00%{fill:#ECEFF4} }
    @keyframes s3l { 0%,50.00%,70.00%,75.00%,100%{fill:#4C566A} 50.00%,70.00%{fill:#2E3440} }
    .g4 .step { animation: s4s 10s infinite; }
    .g4 .num { animation: s4n 10s infinite; }
    .g4 .label { animation: s4l 10s infinite; }
    @keyframes s4s { 0%,75.00%,95.00%,100.00%,100%{fill:#ECEFF4;stroke:#4C566A} 75.00%,95.00%{fill:#88C0D0;stroke:#88C0D0} }
    @keyframes s4n { 0%,75.00%,95.00%,100.00%,100%{fill:#4C566A} 75.00%,95.00%{fill:#ECEFF4} }
    @keyframes s4l { 0%,75.00%,95.00%,100.00%,100%{fill:#4C566A} 75.00%,95.00%{fill:#2E3440} }
  </style>
  <rect width="100%" height="100%" class="bg"/>
  <g class="g1" transform="translate(95,55)">
    <circle class="step" r="26"/>
    <text class="num" y="1">1</text>
    <text class="label" y="50">Browse markets</text>
</g>
  <g class="g2" transform="translate(255,55)">
    <circle class="step" r="26"/>
    <text class="num" y="1">2</text>
    <text class="label" y="50">Place order</text>
</g>
  <g class="g3" transform="translate(415,55)">
    <circle class="step" r="26"/>
    <text class="num" y="1">3</text>
    <text class="label" y="50">Trade executes</text>
</g>
  <g class="g4" transform="translate(575,55)">
    <circle class="step" r="26"/>
    <text class="num" y="1">4</text>
    <text class="label" y="50">Portfolio updates</text>
</g>
  <line class="arrow" x1="121" y1="55" x2="229" y2="55"/>
  <line class="arrow" x1="281" y1="55" x2="389" y2="55"/>
  <line class="arrow" x1="441" y1="55" x2="549" y2="55"/>
</svg>
